<script>
  renderComponents('servicios');
  initPage('servicios');

  // Forzar que todas las service-cards sean visibles e interactivas
  // (el IntersectionObserver a veces no dispara en elementos ya en viewport)
  document.querySelectorAll('.service-card').forEach(function(card) {
    card.classList.add('revealed');
    card.style.opacity = '1';
    card.style.transform = 'none';
    card.style.pointerEvents = 'auto';
  });

  // ══════════════════════════════════════════════
  // MODAL LOGIC
  // ══════════════════════════════════════════════
  const overlay  = document.getElementById('svcOverlay');
  const closeBtn = document.getElementById('svcClose');

  function openModal(name) {
    const s = SERVICES[name];
    if (!s) return;

    document.getElementById('svcModalImg').src       = s.img;
    document.getElementById('svcModalImg').alt       = name;
    document.getElementById('svcModalNum').textContent   = s.num;
    document.getElementById('svcModalTitle').textContent = name;
    document.getElementById('svcModalDuration').querySelector('span').textContent = s.duration;
    document.getElementById('svcModalPrice').querySelector('span').textContent    = s.price;
    document.getElementById('svcModalDesc').textContent  = s.desc;

    const featEl = document.getElementById('svcModalFeatures');
    featEl.innerHTML = s.features.map(f =>
      `<div class="svc-modal-feature">${f}</div>`
    ).join('');

    document.getElementById('svcModalCta').href = `reservas.html`;

    overlay.classList.add('open');
    document.body.classList.add('modal-open');
    closeBtn.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.classList.remove('modal-open');
  }

  // Cerrar modal
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  // ── Event delegation: click en card O en botón abre el modal ──
  document.querySelector('.services-grid').addEventListener('click', function(e) {
    const card = e.target.closest('.service-card');
    if (!card) return;
    const nameEl = card.querySelector('.service-name');
    if (nameEl) openModal(nameEl.textContent.trim());
  });
</script>
</body>
</html>
