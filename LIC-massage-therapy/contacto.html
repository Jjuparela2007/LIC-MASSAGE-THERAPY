<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIC Massage Therapy | Contacto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<!-- ══════════════════ HERO ══════════════════ -->
<section class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-content">
    <div class="section-tag reveal" data-i18n="contact.tag"></div>
    <h1 class="page-hero-title reveal delay-1">
      <em data-i18n="contact.title1"></em>
    </h1>
  </div>
</section>

<!-- ══════════════════ CONTACTO ══════════════════ -->
<section class="contact-page">
  <div class="section-container">
    <div class="contact-inner">

      <!-- ── Información de contacto ── -->
      <div class="contact-info">
        <div class="section-tag reveal" data-i18n="contact.infoTag"></div>
        <h2 class="section-title reveal delay-1">
          <em data-i18n="contact.infoTitle1"></em> <strong data-i18n="contact.infoTitle2"></strong>
        </h2>
        <div class="gold-line reveal delay-2"></div>
        <p class="contact-desc reveal delay-2" data-i18n="contact.desc"></p>

        <div class="contact-cards reveal delay-3">

          <!-- Dirección -->
          <div class="contact-card">
            <div class="contact-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div>
              <div class="contact-card-label" data-i18n="contact.address"></div>
              <div class="contact-card-value" data-i18n="book.location"></div>
            </div>
          </div>

          <!-- Horarios -->
          <div class="contact-card">
            <div class="contact-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
              </svg>
            </div>
            <div>
              <div class="contact-card-label" data-i18n="contact.hours"></div>
              <div class="contact-card-value" data-i18n="contact.hours.lv"></div>
              <div class="contact-card-value" data-i18n="contact.hours.sat"></div>
              <div class="contact-card-value" data-i18n="contact.hours.sun"></div>
            </div>
          </div>

          <!-- Teléfono -->
          <div class="contact-card">
            <div class="contact-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.4 1.14 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
              </svg>
            </div>
            <div>
              <div class="contact-card-label" data-i18n="contact.phone"></div>
              <div class="contact-card-value" data-i18n="book.phone"></div>
            </div>
          </div>

          <!-- Email -->
          <div class="contact-card">
            <div class="contact-card-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div>
              <div class="contact-card-label" data-i18n="contact.email"></div>
              <div class="contact-card-value" data-i18n="contact.emailVal"></div>
            </div>
          </div>

        </div>
      </div>

      <!-- ── Formulario ── -->
      <div class="contact-form-wrap reveal delay-2">
        <div class="booking-form">

          <div style="margin-bottom:2rem">
            <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:400;margin-bottom:.5rem;color:var(--text-primary)"
                 data-i18n="contact.formTitle"></div>
            <div style="font-size:.78rem;color:var(--text-muted)"
                 data-i18n="form.subtitle"></div>
          </div>

          <div class="form-grid">
            <input type="text"  class="form-input" id="cf-name"    data-i18n-placeholder="contact.form.namePh"    autocomplete="name">
            <input type="tel"   class="form-input" id="cf-phone"   data-i18n-placeholder="contact.form.phonePh"   autocomplete="tel">
            <input type="email" class="form-input" id="cf-email"   data-i18n-placeholder="contact.form.emailPh"   autocomplete="email">
            <input type="text"  class="form-input" id="cf-subject" data-i18n-placeholder="contact.form.subjectPh">
            <textarea class="form-textarea form-input" id="cf-message" rows="5"
                      data-i18n-placeholder="contact.form.messagePh"
                      style="grid-column:1/-1"></textarea>
          </div>

          <!-- Feedback inline -->
          <div id="cf-feedback" style="
            display:none;
            margin-top:1rem;
            padding:.75rem 1rem;
            border-radius:4px;
            font-size:.82rem;
            line-height:1.5;
          "></div>

          <!-- ── Consentimiento de privacidad ── -->
          <label id="cf-consent-wrap" style="
            display:flex;
            align-items:flex-start;
            gap:.75rem;
            margin-top:1.5rem;
            cursor:pointer;
            user-select:none;
          ">
            <span style="position:relative;flex-shrink:0;margin-top:2px;">
              <input type="checkbox" id="cf-consent" style="
                appearance:none;
                -webkit-appearance:none;
                width:18px;height:18px;
                border:1.5px solid var(--gold,#c9a84c);
                border-radius:3px;
                background:transparent;
                cursor:pointer;
                display:block;
                transition:background .2s,border-color .2s;
              ">
              <svg id="cf-consent-check" viewBox="0 0 12 10" fill="none"
                   style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                          width:10px;height:10px;pointer-events:none;display:none;">
                <polyline points="1,5 4.5,8.5 11,1" stroke="var(--gold,#c9a84c)"
                          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span style="font-size:.78rem;line-height:1.55;color:var(--text-muted,#888);">
              <span data-i18n="contact.consent.pre"></span>
              <a href="politica-privacidad.html" target="_blank" rel="noopener"
                 style="color:var(--gold,#c9a84c);text-decoration:underline;text-underline-offset:2px;"
                 data-i18n="contact.consent.link"></a>
              <span data-i18n="contact.consent.post"></span>
              <strong style="color:var(--text-primary,#f0ede8);" data-i18n="contact.consent.bold"></strong>
              <span data-i18n="contact.consent.end"></span>
            </span>
          </label>

          <button class="form-submit" id="cf-submit" disabled
                  style="margin-top:1rem;opacity:.5;cursor:not-allowed;"
                  data-i18n="contact.send"></button>

        </div>
      </div>

    </div>
  </div>
</section>

<!-- ══════════════════ CTA STRIP ══════════════════ -->
<section class="cta-strip">
  <div class="section-container">
    <div class="cta-strip-inner reveal">
      <div>
        <div class="cta-strip-title" data-i18n="cta.title"></div>
        <div class="cta-strip-sub"   data-i18n="cta.sub2"></div>
      </div>
      <a href="reservas.html" class="btn-primary" data-i18n="nav.book"></a>
    </div>
  </div>
</section>

<script src="shared.js"></script>
<script src="components.js"></script>
<script>
  renderComponents('contacto');
  initPage('contacto');

  const WHATSAPP_NUMBER = '573138332309'; // sin +, sin espacios

  /* ── Helper i18n ── */
  function t(key) {
    const lang = document.documentElement.lang || 'es';
    return (i18n[lang] && i18n[lang][key]) ? i18n[lang][key] : key;
  }

  /* ── Referencias ── */
  const btn           = document.getElementById('cf-submit');
  const feedback      = document.getElementById('cf-feedback');
  const fName         = document.getElementById('cf-name');
  const fPhone        = document.getElementById('cf-phone');
  const fEmail        = document.getElementById('cf-email');
  const fSubject      = document.getElementById('cf-subject');
  const fMsg          = document.getElementById('cf-message');
  const fConsent      = document.getElementById('cf-consent');
  const fConsentCheck = document.getElementById('cf-consent-check');
  const allFields     = [fName, fPhone, fEmail, fSubject, fMsg];

  /* ── Checkbox visual ── */
  fConsent.addEventListener('change', function() {
    fConsent.style.background   = fConsent.checked ? 'rgba(201,168,76,0.15)' : 'transparent';
    fConsentCheck.style.display = fConsent.checked ? 'block' : 'none';
    validateForm();
  });

  /* ── Validación ── */
  function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
  function isValidPhone(v) { return /^[+]?[\d\s\-]{7,15}$/.test(v); }

  function validateForm() {
    const ok =
      fName.value.trim()    &&
      fPhone.value.trim()   &&
      fEmail.value.trim()   &&
      fSubject.value.trim() &&
      fMsg.value.trim()     &&
      isValidEmail(fEmail.value.trim()) &&
      isValidPhone(fPhone.value.trim()) &&
      fConsent.checked;

    btn.disabled      = !ok;
    btn.style.opacity = ok ? '1' : '0.5';
    btn.style.cursor  = ok ? 'pointer' : 'not-allowed';
  }

  allFields.forEach(function(f) { f.addEventListener('input', validateForm); });
  validateForm();

  /* ── Feedback visual ── */
  function showFeedback(msg, type) {
    const styles = {
      success: { bg: 'rgba(42,110,58,0.15)',  border: '#2a6e3a',          color: '#2a6e3a' },
      error:   { bg: 'rgba(231,76,60,0.12)',  border: '#e74c3c',          color: '#e74c3c' },
      loading: { bg: 'rgba(201,168,76,0.10)', border: 'var(--gold)',      color: 'var(--gold)' },
    };
    const s = styles[type];
    Object.assign(feedback.style, {
      display:    'block',
      background: s.bg,
      border:     '1px solid ' + s.border,
      color:      s.color,
    });
    feedback.textContent = msg;
  }

  /* ── Reset formulario ── */
  function resetForm() {
    allFields.forEach(function(f) { f.value = ''; });
    fConsent.checked            = false;
    fConsent.style.background   = 'transparent';
    fConsentCheck.style.display = 'none';
    btn.textContent             = t('contact.btn.reset');
    btn.style.background        = '';
    validateForm();
    setTimeout(function() { feedback.style.display = 'none'; }, 6000);
  }

  /* ── Mensaje para WhatsApp (i18n-aware) ── */
  function buildWhatsAppMsg(name, phone, email, subject, message) {
    return encodeURIComponent(
      t('contact.wa.greeting') + ' ' + name + '.\n\n' +
      t('contact.wa.intent') + ' ' + subject + '.\n\n' +
      message + '\n\n' +
      t('contact.wa.contact') + '\n' +
      phone + '\n' +
      email + '\n\n' +
      t('contact.wa.closing')
    );
  }

  /* ── Envío ── */
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    if (btn.disabled) return;

    const name    = fName.value.trim();
    const phone   = fPhone.value.trim();
    const email   = fEmail.value.trim();
    const subject = fSubject.value.trim();
    const message = fMsg.value.trim();

    /* Estado: cargando */
    btn.disabled      = true;
    btn.style.opacity = '0.7';
    btn.textContent   = t('contact.submitting');
    showFeedback(t('contact.feedback.loading'), 'loading');

    const waURL = 'https://wa.me/' + WHATSAPP_NUMBER +
                  '?text=' + buildWhatsAppMsg(name, phone, email, subject, message);

    setTimeout(function() {
      btn.textContent      = t('contact.submitted');
      btn.style.background = '#2a6e3a';
      btn.style.opacity    = '1';
      showFeedback(t('contact.feedback.success'), 'success');
      window.open(waURL, '_blank', 'noopener,noreferrer');
      setTimeout(resetForm, 3000);
    }, 600);
  });
</script>
</body>
</html>
