<script>
/* ── Animaciones scroll ── */
(function () {
  var els = document.querySelectorAll('.slide-left, .slide-right, .slide-up');
  if (!els.length) return;
  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  els.forEach(function (el) { io.observe(el); });
})();

/* ══════════════════════════════════════════════
   GALERÍA CARRUSEL
══════════════════════════════════════════════ */
(function () {
  var track    = document.getElementById('galleryTrack');
  if (!track) return;
  var slides   = track.querySelectorAll('.gallery-slide');
  var dotsEl   = document.getElementById('galleryDots');
  var thumbsEl = document.getElementById('galleryThumbs');
  var counter  = document.getElementById('galleryCounter');
  var btnPrev  = document.getElementById('galleryPrev');
  var btnNext  = document.getElementById('galleryNext');
  var total    = slides.length;
  var current  = 0;
  var autoTimer;

  /* Construir dots */
  for (var i = 0; i < total; i++) {
    var d = document.createElement('button');
    d.className = 'gallery-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Imagen ' + (i + 1));
    d.setAttribute('data-idx', i);
    dotsEl.appendChild(d);
  }

  function goTo(idx) {
    idx = (idx + total) % total;
    slides[current].classList.remove('active');
    slides[idx].classList.add('active');
    current = idx;
    track.style.transform = 'translateX(-' + (current * 100) + '%)';
    dotsEl.querySelectorAll('.gallery-dot').forEach(function (d, i) {
      d.classList.toggle('active', i === current);
    });
    counter.textContent = (current + 1) + ' / ' + total;
    thumbsEl.querySelectorAll('[data-idx]').forEach(function (t) {
      t.classList.toggle('active', parseInt(t.getAttribute('data-idx')) === current);
    });
  }

  btnPrev.addEventListener('click', function () { goTo(current - 1); resetAuto(); });
  btnNext.addEventListener('click', function () { goTo(current + 1); resetAuto(); });

  dotsEl.addEventListener('click', function (e) {
    var b = e.target.closest('[data-idx]');
    if (b) { goTo(parseInt(b.getAttribute('data-idx'))); resetAuto(); }
  });
  thumbsEl.addEventListener('click', function (e) {
    var b = e.target.closest('[data-idx]');
    if (b) { goTo(parseInt(b.getAttribute('data-idx'))); resetAuto(); }
  });

  /* Swipe táctil */
  var tx = 0;
  track.parentElement.addEventListener('touchstart', function (e) { tx = e.changedTouches[0].clientX; }, { passive: true });
  track.parentElement.addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 40) { goTo(current + (dx < 0 ? 1 : -1)); resetAuto(); }
  }, { passive: true });

  /* Teclado */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft')  { goTo(current - 1); resetAuto(); }
    if (e.key === 'ArrowRight') { goTo(current + 1); resetAuto(); }
  });

  /* Autoplay */
  function startAuto() { autoTimer = setInterval(function () { goTo(current + 1); }, 4500); }
  function resetAuto() { clearInterval(autoTimer); startAuto(); }
  track.parentElement.addEventListener('mouseenter', function () { clearInterval(autoTimer); });
  track.parentElement.addEventListener('mouseleave', startAuto);
  startAuto();
  goTo(0);
})();
</script>
