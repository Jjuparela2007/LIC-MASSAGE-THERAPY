<script>
(function () {
  var splash   = document.getElementById('splashScreen');
  var bar      = document.getElementById('splashBar');
  var duration = 500; // ms total visible
  var fadeTime = 750;  // ms fade-out (matches CSS)

  /* Progreso animado */
  var start = null;
  function animateBar(ts) {
    if (!start) start = ts;
    var pct = Math.min(((ts - start) / duration) * 100, 100);
    bar.style.width = pct + '%';
    if (pct < 100) requestAnimationFrame(animateBar);
  }
  requestAnimationFrame(animateBar);

  /* Ocultar splash */
  function hideSplash() {
    splash.classList.add('fade-out');
    setTimeout(function () {
      splash.style.display = 'none';
    }, fadeTime + 10);
  }

  /* Disparar al mayor: duración mínima o carga de página */
  var loaded   = false;
  var timerDone = false;

  function tryHide() {
    if (loaded && timerDone) hideSplash();
  }

  setTimeout(function () {
    timerDone = true;
    tryHide();
  }, duration);

  if (document.readyState === 'complete') {
    loaded = true;
  } else {
    window.addEventListener('load', function () {
      loaded = true;
      tryHide();
    });
  }
})();
</script>

<!-- ─── SCRIPTS: Video + Tabs ─────────────────────────────────────────────── -->
<script>
/* ── Tabs ── */
var tabBtns   = document.querySelectorAll('.tab-btn');
var tabInd    = document.getElementById('tabIndicator');
function switchTab(idx) {
  tabBtns.forEach(function(b,i){
    b.classList.toggle('active', i === idx);
    b.setAttribute('aria-selected', i === idx);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p,i){
    p.classList.toggle('active', i === idx);
  });
  var active = tabBtns[idx];
  tabInd.style.left  = active.offsetLeft + 'px';
  tabInd.style.width = active.offsetWidth + 'px';
  if (idx === 0) bcInit();
}

/* Init indicator */
window.addEventListener('load', function() {
  switchTab(0);
  /* Re-aplicar idioma DESPUÉS de que load haya generado los elementos dinámicos
     (dots del carousel, indicador de tabs, etc.) */
  if (typeof applyLang === 'function' && typeof currentLang !== 'undefined') {
    applyLang(currentLang);
  }
});

/* ── Benefits carousel ── */
var bcPos   = 0;
var bcTotal = 5;
var bcVisible = 3;

function bcGetVisible() {
  return window.innerWidth <= 560 ? 1 : window.innerWidth <= 900 ? 2 : 3;
}

/* Helper para leer traducciones (disponible tras cargar shared.js) */
function bcT(key, fallback) {
  if (typeof i18n !== 'undefined' && typeof currentLang !== 'undefined') {
    var val = i18n[currentLang] && i18n[currentLang][key];
    if (val !== undefined) return val;
  }
  return fallback || key;
}

function bcInit() {
  bcVisible = bcGetVisible();
  var dotsEl = document.getElementById('bcDots');
  var pages  = Math.ceil(bcTotal / bcVisible);
  dotsEl.innerHTML = '';
  for (var i = 0; i < pages; i++) {
    var d = document.createElement('button');
    d.className = 'bc-dot' + (i === 0 ? ' active' : '');
    /* FIX: aria-label traducido según idioma activo */
    d.setAttribute('aria-label', bcT('bc.page', 'Page') + ' ' + (i+1));
    d.setAttribute('data-page', i);
    d.onclick = (function(pg){ return function(){ bcGoTo(pg); }; })(i);
    dotsEl.appendChild(d);
  }
  /* FIX: re-aplicar traducciones a las tarjetas estáticas del carousel */
  bcApplyLang();
  bcGoTo(0);
}

/* Re-aplica las traducciones i18n a todos los elementos [data-i18n] dentro
   del panel de beneficios, para cuando el idioma cambia sin re-renderizar el HTML */
function bcApplyLang() {
  if (typeof i18n === 'undefined' || typeof currentLang === 'undefined') return;
  var panel = document.getElementById('panel-0');
  if (!panel) return;
  panel.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    var val = i18n[currentLang] && i18n[currentLang][key];
    if (val !== undefined) el.textContent = val;
  });
  /* También actualizar aria-labels de los dots ya creados */
  document.querySelectorAll('.bc-dot').forEach(function(d, i) {
    d.setAttribute('aria-label', bcT('bc.page', 'Page') + ' ' + (i+1));
  });
}

function bcGoTo(page) {
  bcVisible = bcGetVisible();
  var pages  = Math.ceil(bcTotal / bcVisible);
  page = Math.max(0, Math.min(page, pages - 1));
  bcPos = page;
  var cardW = document.querySelector('.bc-card');
  if (!cardW) return;
  var gap    = 19.2; // ~1.2rem
  var shift  = page * bcVisible * (cardW.offsetWidth + gap);
  document.getElementById('bcTrack').style.transform = 'translateX(-' + shift + 'px)';
  document.querySelectorAll('.bc-dot').forEach(function(d, i) {
    d.classList.toggle('active', i === page);
  });
  document.getElementById('bcPrev').disabled = page === 0;
  document.getElementById('bcNext').disabled = page >= pages - 1;
}

function bcSlide(dir) {
  bcGoTo(bcPos + dir);
}

window.addEventListener('resize', function() { bcInit(); });

/* FIX: escuchar cambio de idioma para re-traducir la sección de beneficios */
document.addEventListener('langChange', function() {
  bcApplyLang();
});
</script>



<!-- ─── SCRIPT DE SERVICIOS ───────────────────────────────────────────────── -->
<script>
(function () {
  /* ── Definición de servicios (solo claves, sin texto hardcodeado) ─── */
  var SERVICE_KEYS = [
    {
      num: "01",
      img: "https://images.unsplash.com/photo-1649751361457-01d3a696c7e6?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
      nameKey: "s1.name", tagKey: "s1.tag", shortKey: "s1.short",
      descKey: "s1.desc", durationKey: "s1.duration",
      featureKeys: ["s1.feat1","s1.feat2","s1.feat3","s1.feat4"]
    },
    {
      num: "02",
      img: "https://images.unsplash.com/photo-1519823551278-64ac92734fb1?w=600&q=80&fit=crop",
      nameKey: "s2.name", tagKey: "s2.tag", shortKey: "s2.short",
      descKey: "s2.desc", durationKey: "s2.duration",
      featureKeys: ["s2.feat1","s2.feat2","s2.feat3","s2.feat4"]
    },
    
  ];

  var currentOpen = -1;

  /* ── Helper: leer traducción del sistema i18n de shared.js ──────── */
  function t(key) {
    if (typeof i18n !== 'undefined' && typeof currentLang !== 'undefined') {
      var dict = i18n[currentLang];
      if (dict && dict[key] !== undefined) return dict[key];
    }
    return key;
  }

  /* ── Renderizar tarjetas ────────────────────────────────────────── */
  var grid = document.getElementById('servicesGrid');

  function renderCards() {
    grid.innerHTML = '';
    SERVICE_KEYS.forEach(function (s, i) {
      var card = document.createElement('div');
      card.className = 'preview-card reveal';
      card.style.cursor = 'pointer';
      card.innerHTML =
        '<img class="sp-card-img" src="' + s.img + '" alt="' + t(s.nameKey) + '" loading="lazy">' +
        '<div style="padding:1rem 0 0">' +
          '<div class="preview-num">' + s.num + '</div>' +
          '<div class="preview-name">' + t(s.nameKey) + '</div>' +
          '<p class="preview-desc">' + t(s.shortKey) + '</p>' +
          '<div class="sp-card-more">' + t('sp.moreInfo') + '</div>' +
        '</div>';
      card.addEventListener('click', function () { openModal(i); });
      grid.appendChild(card);
    });
    // Re-observar los nuevos elementos para el scroll reveal
    if (typeof initScrollReveal === 'function') initScrollReveal();
  }

  /* ── Modal ──────────────────────────────────────────────────────── */
  var overlay  = document.getElementById('modalOverlay');
  var modalX   = document.getElementById('modalX');
  var closeBtn = document.getElementById('modalCloseBtn');

  function openModal(i) {
    currentOpen = i;
    var s = SERVICE_KEYS[i];
    document.getElementById('modalImg').src               = s.img;
    document.getElementById('modalImg').alt               = t(s.nameKey);
    document.getElementById('modalTag').textContent       = t(s.tagKey);
    document.getElementById('modalName').textContent      = t(s.nameKey);
    document.getElementById('modalDuration').textContent  = '⏱ ' + t(s.durationKey);
    document.getElementById('modalDesc').textContent      = t(s.descKey);
    document.getElementById('modalFeatures').innerHTML    =
      s.featureKeys.map(function (k) { return '<div class="modal-feat">' + t(k) + '</div>'; }).join('');
    var bookBtn = document.querySelector('.modal-book');
    if (bookBtn) bookBtn.textContent = t('sp.book');
    if (closeBtn) closeBtn.textContent = t('sp.close');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    currentOpen = -1;
  }

  modalX.addEventListener('click', closeModal);
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

  /* ── Re-renderizar cuando shared.js cambia el idioma ───────────── */
  document.addEventListener('langChange', function () {
    renderCards();
    // Si el modal estaba abierto, actualizarlo también
    if (currentOpen >= 0) openModal(currentOpen);
  });

  /* ── Render inicial ─────────────────────────────────────────────── */
  renderCards();
})();
</script>
