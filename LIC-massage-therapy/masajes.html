<style>
/* ═══════════════════════════════════════════
   GALLERY — 3D Bento + Cursor Spotlight
═══════════════════════════════════════════ */
.gal-section {
  position: relative;
  background: #071E1E;
  padding: 6rem 3rem 5rem;
  overflow: hidden;
  cursor: none;
}

/* ── Grain ── */
.gal-grain {
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
  background-size: 128px;
  opacity: 0.55;
  pointer-events: none;
  z-index: 1;
  animation: galGrainShift 0.18s steps(1) infinite;
}

@keyframes galGrainShift {
  0%  { transform: translate(0,0); }
  25% { transform: translate(-2%,-3%); }
  50% { transform: translate(3%,1%); }
  75% { transform: translate(-1%,4%); }
}

/* ── Spotlight ── */
.gal-spotlight {
  position: absolute;
  width: 520px;
  height: 520px;
  border-radius: 50%;
  background: radial-gradient(
    circle,
    rgba(210, 175, 110, 0.18) 0%,
    rgba(210, 175, 110, 0.07) 35%,
    transparent 70%
  );
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 2;
  transition: opacity 0.4s ease;
  top: 50%;
  left: 50%;
}

/* ── Header ── */
.gal-header {
  position: relative;
  z-index: 3;
  max-width: 1200px;
  margin: 0 auto 3.5rem;
}

.gal-tag {
  display: inline-block;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(210,175,110,0.7);
  border: 1px solid rgba(210,175,110,0.25);
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 1.2rem;
}

.gal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.6rem, 5vw, 4.2rem);
  font-weight: 300;
  line-height: 1.05;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.gal-title-line { display: block; overflow: hidden; }

.gal-title em {
  font-style: italic;
  font-weight: 300;
  color: rgba(245, 240, 228, 0.45);
}

.gal-title strong {
  font-weight: 700;
  color: #f5f0e4;
}

/* ── 3D Stage ── */
.gal-stage {
  position: relative;
  z-index: 3;
  max-width: 1200px;
  margin: 0 auto;
  perspective: 1100px;
  perspective-origin: 50% 50%;
}

/* ── Grid ── */
.gal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: 210px 210px 200px;
  gap: 6px;
  transform-style: preserve-3d;
  transition: transform 0.12s ease-out;
  will-change: transform;
}

/* ── Each card ── */
.gal-card {
  position: relative;
  overflow: hidden;
  border-radius: 6px;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.34, 1.4, 0.64, 1),
              box-shadow 0.45s ease;
  will-change: transform;
}

.gal-card:hover {
  transform: translateZ(28px) scale(1.025);
  box-shadow: 0 28px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(210,175,110,0.25);
  z-index: 10;
}

/* ── Image ── */
.gal-card img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transition: transform 0.65s ease, filter 0.55s ease;
  filter: grayscale(55%) brightness(0.55) saturate(0.6);
}

.gal-card:hover img {

<script>
(function () {
  var section   = document.getElementById('galSection');
  var stage     = document.getElementById('galStage');
  var grid      = document.getElementById('galGrid');
  var spotlight = document.getElementById('galSpotlight');
  if (!section || !grid) return;

  var raf = null;
  var targetRX = 0, targetRY = 0;
  var currentRX = 0, currentRY = 0;
  var spotX = 0, spotY = 0;
  var targetSX = 0, targetSY = 0;
  var inside = false;

  /* ── Mouse tracking ── */
  section.addEventListener('mousemove', function (e) {
    inside = true;
    spotlight.style.opacity = '1';

    var r  = section.getBoundingClientRect();
    var cx = r.left + r.width  / 2;
    var cy = r.top  + r.height / 2;
    var nx = (e.clientX - cx) / (r.width  / 2);   /* -1 → 1 */
    var ny = (e.clientY - cy) / (r.height / 2);   /* -1 → 1 */

    targetRX = ny * -6;
    targetRY = nx *  9;

    /* Spotlight position relative to section */
    targetSX = e.clientX - r.left;
    targetSY = e.clientY - r.top;
  });

  section.addEventListener('mouseleave', function () {
    inside = false;
    targetRX = 0;
    targetRY = 0;
    spotlight.style.opacity = '0';
  });

  /* ── Lerp animation loop ── */
  function lerp(a, b, t) { return a + (b - a) * t; }

  function tick() {
    currentRX = lerp(currentRX, targetRX, 0.08);
    currentRY = lerp(currentRY, targetRY, 0.08);
    spotX     = lerp(spotX, targetSX, 0.12);
    spotY     = lerp(spotY, targetSY, 0.12);

    grid.style.transform =
      'rotateX(' + currentRX.toFixed(3) + 'deg) rotateY(' + currentRY.toFixed(3) + 'deg)';
    spotlight.style.left = spotX + 'px';
    spotlight.style.top  = spotY + 'px';

    raf = requestAnimationFrame(tick);
  }
  tick();
})();
</script>

<script>
(function() {
  const track  = document.getElementById('wsCarouselTrack');
  const dotsEl = document.getElementById('wsCarouselDots');
  if (!track) return;

  const slides = track.querySelectorAll('.ws-slide');
  const total  = slides.length;
  let current  = 0;
  let autoTimer;

  // Build dots
  slides.forEach(function(_, i) {
    const d = document.createElement('button');
    d.className = 'ws-dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Ir a imagen ' + (i+1));
    d.addEventListener('click', function() { goTo(i); resetAuto(); });
    dotsEl.appendChild(d);
  });

  function goTo(idx) {
    current = (idx + total) % total;
    track.style.transform = 'translateX(-' + (current * 100) + '%)';
    dotsEl.querySelectorAll('.ws-dot').forEach(function(d, i) {
      d.classList.toggle('active', i === current);
    });
  }

  function resetAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(function() { goTo(current + 1); }, 4500);
  }

  document.getElementById('wsCarouselPrev').addEventListener('click', function() { goTo(current - 1); resetAuto(); });
  document.getElementById('wsCarouselNext').addEventListener('click', function() { goTo(current + 1); resetAuto(); });

  // Swipe support
  let startX = 0;
  track.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, {passive:true});
  track.addEventListener('touchend',   function(e) {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) { goTo(dx < 0 ? current + 1 : current - 1); resetAuto(); }
  }, {passive:true});

  resetAuto();
})();
</script>

<script>
  renderComponents('servicios');
  initPage('servicios');

  // Forzar que todas las service-cards sean visibles e interactivas
  // (el IntersectionObserver a veces no dispara en elementos ya en viewport)
  document.querySelectorAll('.service-card').forEach(function(card) {
    card.classList.add('revealed');
    card.style.opacity = '1';
    card.style.transform = 'none';
    card.style.pointerEvents = 'auto';
  });

  // ══════════════════════════════════════════════
  // MODAL LOGIC
  // ══════════════════════════════════════════════
  const overlay  = document.getElementById('svcOverlay');
  const closeBtn = document.getElementById('svcClose');
  let currentModalKey = null;

  function openModal(key) {
    const s = SERVICE_KEYS[key];
    if (!s) return;
    currentModalKey = key;

    document.getElementById('svcModalImg').src        = s.img;
    document.getElementById('svcModalImg').alt        = t(s.nameKey);
    document.getElementById('svcModalNum').textContent    = s.num;
    document.getElementById('svcModalTitle').textContent  = t(s.nameKey);
    document.getElementById('svcModalDuration').querySelector('span').textContent = t(s.durationKey);
    document.getElementById('svcModalPrice').querySelector('span').textContent    = t(s.priceKey);
    document.getElementById('svcModalDesc').textContent   = t(s.descKey);

    const featEl = document.getElementById('svcModalFeatures');
    featEl.innerHTML = s.featKeys.map(k =>
      `<div class="svc-modal-feature">${t(k)}</div>`
    ).join('');

    // Texto del botón CTA del modal
    const ctaSpan = document.querySelector('#svcModalCta span[data-i18n]');
    if (ctaSpan) ctaSpan.textContent = t('svc.modal.cta');

    overlay.classList.add('open');
    document.body.classList.add('modal-open');
    closeBtn.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.classList.remove('modal-open');
    currentModalKey = null;
  }

  // Cerrar modal
  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  // ── Event delegation: click en card O en botón abre el modal ──
  document.querySelector('.services-grid').addEventListener('click', function(e) {
    const card = e.target.closest('.service-card');
    if (!card) return;
    const key = card.getAttribute('data-service-key');
    if (key) openModal(key);
  });

  // ── Re-renderizar modal si está abierto al cambiar idioma ──
  document.addEventListener('langChange', function() {
    if (currentModalKey) openModal(currentModalKey);
  });
</script>
