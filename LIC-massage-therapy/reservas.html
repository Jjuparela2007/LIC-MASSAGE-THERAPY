<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIC Massage Therapy | Reservar Cita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<!-- ══════════════════ HERO ══════════════════ -->
<section class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-content">
    <div class="section-tag reveal" data-i18n="book.tag"></div>
    <h1 class="page-hero-title reveal delay-1">
      <em data-i18n="book.title1"></em> <strong data-i18n="book.title2"></strong>
    </h1>
    <p class="page-hero-sub reveal delay-2" data-i18n="book.desc"></p>
  </div>
</section>

<!-- ══════════════════ BOOKING ══════════════════ -->
<section class="booking-page">
  <div class="section-container">
    <div class="booking-inner">

      <!-- ════════════ INFO ════════════ -->
      <div class="booking-info">
        <div class="section-tag reveal" data-i18n="book.infoTag"></div>
        <h2 class="section-title reveal delay-1">
          <em data-i18n="book.infoTitle1"></em><br>
          <strong data-i18n="book.infoTitle2"></strong>
        </h2>
        <div class="gold-line reveal delay-2"></div>

        <div class="booking-steps reveal delay-2">
          <div class="bstep">
            <div class="bstep-num">01</div>
            <div>
              <div class="bstep-name" data-i18n="step1.name"></div>
              <p class="bstep-desc" data-i18n="step1.desc"></p>
            </div>
          </div>
          <div class="bstep">
            <div class="bstep-num">02</div>
            <div>
              <div class="bstep-name" data-i18n="step2.name"></div>
              <p class="bstep-desc" data-i18n="step2.desc"></p>
            </div>
          </div>
          <div class="bstep">
            <div class="bstep-num">03</div>
            <div>
              <div class="bstep-name" data-i18n="step3.name"></div>
              <p class="bstep-desc" data-i18n="step3.desc"></p>
            </div>
          </div>
          <div class="bstep">
            <div class="bstep-num">04</div>
            <div>
              <div class="bstep-name" data-i18n="step4.name"></div>
              <p class="bstep-desc" data-i18n="step4.desc"></p>
            </div>
          </div>
        </div>

        <div class="booking-detail-list reveal delay-3">
          <div class="booking-detail">
            <div class="booking-detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <span data-i18n="book.location"></span>
          </div>
          <div class="booking-detail">
            <div class="booking-detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            </div>
            <span data-i18n="book.hours"></span>
          </div>
          <div class="booking-detail">
            <div class="booking-detail-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.4 1.14 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            </div>
            <span data-i18n="book.phone"></span>
          </div>
        </div>
      </div>

      <!-- ════════════ FORM ════════════ -->
      <div class="booking-form reveal delay-2">

        <div style="margin-bottom:2rem">
          <div style="font-family:var(--font-display);font-size:1.6rem;font-weight:400;margin-bottom:.5rem;color:var(--text-primary)" data-i18n="form.title"></div>
          <div style="font-size:.78rem;color:var(--text-muted)" data-i18n="form.subtitle"></div>
        </div>

        <div class="form-grid">

          <!-- Nombre -->
          <div class="form-group" id="fg-name">
            <label class="form-label" for="f-name">
              <span data-i18n="form.name"></span> <span style="color:#c0392b">*</span>
            </label>
            <input type="text" id="f-name" class="form-input" data-i18n-placeholder="form.namePh" autocomplete="name">
            <span class="field-error" data-i18n="error.name"></span>
          </div>

          <!-- Teléfono -->
          <div class="form-group" id="fg-phone">
            <label class="form-label" for="f-phone">
              <span data-i18n="form.phone"></span> <span style="color:#c0392b">*</span>
            </label>
            <input type="tel" id="f-phone" class="form-input" placeholder="+1 718 000 0000" autocomplete="tel">
            <span class="field-error" data-i18n="error.phone"></span>
          </div>

          <!-- Email -->
          <div class="form-group full" id="fg-email">
            <label class="form-label" for="f-email">
              <span data-i18n="form.email"></span> <span style="color:#c0392b">*</span>
            </label>
            <input type="email" id="f-email" class="form-input" placeholder="tu@correo.com" autocomplete="email">
            <span class="field-error" data-i18n="error.email"></span>
          </div>

          <!-- Servicio -->
          <div class="form-group full" id="fg-service">
            <label class="form-label" for="f-service">
              <span data-i18n="form.service"></span> <span style="color:#c0392b">*</span>
            </label>
            <select id="f-service" class="form-select form-input">
              <option value="" data-i18n="form.servicePh"></option>
              <option value="Masaje Relajante"          data-i18n="form.service.opt1"></option>
              <option value="Masaje de presión profunda" data-i18n="form.service.opt2"></option>
              <option value="Relajación guiada"         data-i18n="form.service.opt3"></option>
              <option value="Como dar un masaje a tu pareja"     data-i18n="form.service.opt4"></option>
            </select>
            <span class="field-error" data-i18n="error.service"></span>
          </div>

          <!-- Fecha -->
          <div class="form-group" id="fg-date">
            <label class="form-label" for="f-date">
              <span data-i18n="form.date"></span> <span style="color:#c0392b">*</span>
            </label>
            <input type="date" id="f-date" class="form-input">
            <span class="field-error" data-i18n="error.date"></span>
          </div>

          <!-- Horario -->
          <div class="form-group" id="fg-time">
            <label class="form-label" for="f-time" data-i18n="form.time"></label>
            <input type="time" id="f-time" class="form-input form-select">
          </div>

          <!-- Mensaje -->
          <div class="form-group full">
            <label class="form-label" for="f-message" data-i18n="form.message"></label>
            <textarea id="f-message" class="form-textarea form-input" data-i18n-placeholder="form.messagePh"></textarea>
          </div>

        </div>

        <!-- ── Privacy checkbox ── -->
        <div class="privacy-row" id="privacy-row">
          <input type="checkbox" id="f-privacy" class="privacy-checkbox">
          <label class="privacy-label" for="f-privacy">
            <strong data-i18n="privacy.required"></strong>
            <span data-i18n="privacy.text"></span>
            <a href="politica-privacidad.html" target="_blank" rel="noopener" data-i18n="privacy.link"></a>
            <span data-i18n="privacy.consent"></span>
          </label>
        </div>

        <!-- ── Submit via WhatsApp ── -->
        <button class="form-submit" id="book-submit" data-i18n="form.submit"></button>

      </div>
      <!-- ════════════ / FORM ════════════ -->

    </div>
  </div>
</section>

<!-- Toast -->
<div id="toast"></div>

<script src="shared.js"></script>
<script src="components.js"></script>
<script>
  // ══════════════════════════════════════════════
  // CONFIG
  // ══════════════════════════════════════════════
  const WHATSAPP_NUMBER = '+19294262161'; // sin +, sin espacios

  // ── Page init ──
  renderComponents('reservas');
  initPage('reservas');

  // ── Set today as min date ──
  const dateInput = document.getElementById('f-date');
  dateInput.min = new Date().toISOString().split('T')[0];

  // ── Helper: get current translation ──
  function t(key) {
    const lang = document.documentElement.lang || 'es';
    return (i18n[lang] && i18n[lang][key]) ? i18n[lang][key] : key;
  }

  // ══════════════════════════════════════════════
  // TOAST helper
  // ══════════════════════════════════════════════
  function showToast(msg, type = 'success', duration = 4000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.className = ''; }, duration);
  }

  // ══════════════════════════════════════════════
  // VALIDATION helpers
  // ══════════════════════════════════════════════
  function setFieldState(groupId, valid, inputEl) {
    const group = document.getElementById(groupId);
    if (!group) return;
    group.classList.toggle('has-error', !valid);
    inputEl.classList.toggle('error', !valid);
    inputEl.classList.toggle('valid', valid);
  }

  function validateForm() {
    let ok = true;

    // Nombre
    const name = document.getElementById('f-name');
    const nameOk = name.value.trim().length >= 2;
    setFieldState('fg-name', nameOk, name);
    if (!nameOk) ok = false;

    // Teléfono
    const phone = document.getElementById('f-phone');
    const phoneOk = /^[\+]?[\d\s\-\(\)]{7,20}$/.test(phone.value.trim());
    setFieldState('fg-phone', phoneOk, phone);
    if (!phoneOk) ok = false;

    // Email
    const email = document.getElementById('f-email');
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());
    setFieldState('fg-email', emailOk, email);
    if (!emailOk) ok = false;

    // Servicio
    const service = document.getElementById('f-service');
    const serviceOk = service.value !== '';
    setFieldState('fg-service', serviceOk, service);
    if (!serviceOk) ok = false;

    // Fecha
    const dateVal = document.getElementById('f-date');
    const today = new Date().toISOString().split('T')[0];
    const dateOk = dateVal.value >= today;
    setFieldState('fg-date', dateOk, dateVal);
    if (!dateOk) ok = false;

    // Privacy checkbox
    const privacy = document.getElementById('f-privacy');
    const privacyRow = document.getElementById('privacy-row');
    const privacyOk = privacy.checked;
    privacyRow.classList.toggle('error', !privacyOk);
    if (!privacyOk) ok = false;

    return ok;
  }

  // Clear error state on input
  ['f-name','f-phone','f-email','f-service','f-date'].forEach(function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function() {
      el.classList.remove('error');
      const group = el.closest('.form-group');
      if (group) group.classList.remove('has-error');
    });
  });
  document.getElementById('f-privacy').addEventListener('change', function() {
    document.getElementById('privacy-row').classList.remove('error');
  });

  // ══════════════════════════════════════════════
  // COLLECT form data
  // ══════════════════════════════════════════════
  function getFormData() {
    return {
      name:    document.getElementById('f-name').value.trim(),
      phone:   document.getElementById('f-phone').value.trim(),
      email:   document.getElementById('f-email').value.trim(),
      service: document.getElementById('f-service').value,
      date:    document.getElementById('f-date').value,
      time:    document.getElementById('f-time').value,
      message: document.getElementById('f-message').value.trim() || '—',
    };
  }

  // ══════════════════════════════════════════════
  // SUBMIT → WhatsApp (i18n-aware)
  // ══════════════════════════════════════════════
  document.getElementById('book-submit').addEventListener('click', function(e) {
    e.preventDefault();
    if (!validateForm()) {
      showToast(t('error.fields'), 'error-toast');
      return;
    }

    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>' + t('form.submitting');

    const d = getFormData();

    const msg =
t('wa.greeting') + '\n\n' +
t('wa.intent') + '\n\n' +
t('wa.labelName')    + ': ' + d.name    + '\n' +
t('wa.labelPhone')   + ': ' + d.phone   + '\n' +
t('wa.labelEmail')   + ': ' + d.email   + '\n\n' +
t('wa.labelService') + ': ' + d.service + '\n' +
t('wa.labelDate')    + ': ' + d.date    + '\n' +
t('wa.labelTime')    + ': ' + d.time    + '\n' +
(d.message && d.message !== '—' ? '\n' + t('wa.labelNote') + ':\n' + d.message + '\n' : '') +
'\n' + t('wa.closing');

    const url = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(msg);

    setTimeout(function() {
      btn.innerHTML = t('form.submitted');
      btn.style.background = '#25D366';
      showToast(t('form.successToast'), 'success', 5000);
      window.open(url, '_blank');
      setTimeout(function() {
        btn.innerHTML = t('form.submit');
        btn.style.background = '';
        btn.disabled = false;
      }, 3000);
    }, 600);
  });
</script>
</body>
</html>
